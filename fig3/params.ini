# Coupled Elastic Chains — simulation parameters
# Format: key = value
# Lines starting with '#' and blank lines are ignored.
# Any key omitted here uses the compiled-in default.

# Grid dimensions
Nx   = 32
Ny   = 512

# Elastic coupling constants (along x and along y)
cx   = 1.0
cy   = 1.0

# Pinning strength
V0   = 0.1

# Time step
dt   = 0.01

# Disorder correlation length (piecewise-constant pinning only)
rf   = 500.0

# Temperature
kBT  = 0.25

# Random seed Disorder (overridden by the CLI argument)
seedD = 42

# Random seed Temperature (overridden by the CLI argument)
seedT = 42
